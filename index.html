<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Sistemas · Rastreadores</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='42' fill='%23070B14'/%3E%3Ccircle cx='50' cy='50' r='42' fill='none' stroke='%23FF9142' stroke-width='6'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23FF9142'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070B14;
      --surface: #0E1420;
      --surface-2: #131B2C;
      --border: #212C46;
      --border-soft: #182238;
      --accent: #FF9142;       /* âmbar de sinal — chrome primário / status ao vivo */
      --accent-dim: #C96C29;
      --accent-2: #46D7D0;     /* ciano de dados — ação secundária dos nós */
      --accent-2-dim: #2E9C97;
      --danger: #FF6161;
      --text: #EAF0FB;
      --text-dim: #8592B0;
      --text-mute: #475170;
    }
    * { -webkit-font-smoothing: antialiased; }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(ellipse 1000px 560px at 50% -8%, rgba(255,145,66,0.09), transparent),
        radial-gradient(ellipse 700px 500px at 90% 15%, rgba(70,215,208,0.06), transparent),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding-top: 38px;
    }
    .font-display { font-family: 'Sora', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    /* ============ HUD / TICKER SUPERIOR — elemento assinatura ============ */
    .hud-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 38px; z-index: 40;
      background: linear-gradient(180deg, rgba(14,20,32,0.97), rgba(14,20,32,0.9));
      border-bottom: 1px solid var(--border-soft);
      display: flex; align-items: center; gap: 0;
      backdrop-filter: blur(6px);
      overflow: hidden;
    }
    .hud-segment {
      display: flex; align-items: center; gap: 8px; padding: 0 16px; height: 100%;
      font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; letter-spacing: 0.05em;
      color: var(--text-mute); border-right: 1px solid var(--border-soft); white-space: nowrap;
    }
    .hud-segment.status { color: var(--accent); flex-shrink: 0; }
    .hud-track { flex: 1; overflow: hidden; position: relative; height: 100%; }
    .hud-scroll {
      position: absolute; white-space: nowrap; display: flex; align-items: center; height: 100%;
      gap: 44px; padding-left: 100%;
      animation: hud-scroll-anim 26s linear infinite;
      font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; letter-spacing: 0.04em; color: var(--text-mute);
    }
    .hud-scroll span.hl { color: var(--accent-2); }
    @keyframes hud-scroll-anim { to { transform: translateX(-100%); } }
    .hud-clock { padding: 0 16px; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--text-dim); flex-shrink: 0; }

    /* ============ Fundo tipo mapa de rastreamento ============ */
    .grid-backdrop {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(70,215,208,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(70,215,208,0.045) 1px, transparent 1px),
        radial-gradient(rgba(255,145,66,0.35) 1px, transparent 1.4px);
      background-size: 46px 46px, 46px 46px, 138px 138px;
      background-position: 0 0, 0 0, 23px 23px;
      -webkit-mask-image: radial-gradient(ellipse 750px 560px at 50% 32%, black, transparent 78%);
      mask-image: radial-gradient(ellipse 750px 560px at 50% 32%, black, transparent 78%);
    }
    .scanline-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 41;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
      mix-blend-mode: overlay;
    }

    /* Varredura de radar giratória, atrás do card de login */
    .radar { position: absolute; inset: -60px; z-index: -1; opacity: 0.55; }
    .radar::before {
      content: ''; position: absolute; inset: 0; border-radius: 9999px;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(255,145,66,0.32) 16deg, transparent 42deg);
      animation: spin-radar 4.2s linear infinite;
    }
    .radar::after {
      content: ''; position: absolute; inset: 40px; border-radius: 9999px; border: 1px solid rgba(70,215,208,0.14);
    }
    @keyframes spin-radar { to { transform: rotate(360deg); } }

    .pulse-dot { position: relative; width: 8px; height: 8px; border-radius: 9999px; background: var(--accent); flex-shrink: 0; }
    .pulse-dot::after {
      content: ''; position: absolute; inset: -6px; border-radius: 9999px;
      border: 1.5px solid var(--accent); animation: pulse-ring 2.2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.5); opacity: 0.8; }
      100% { transform: scale(2.1); opacity: 0; }
    }

    /* Barras de sinal — substituem o ponto simples nos cartões de sistema */
    .signal-bars { display: flex; align-items: flex-end; gap: 2.5px; height: 14px; }
    .signal-bars span {
      width: 3px; background: var(--accent-2); border-radius: 1px; opacity: 0.9;
      animation: signal-flicker 1.8s ease-in-out infinite;
    }
    .signal-bars span:nth-child(1) { height: 40%; animation-delay: 0s; }
    .signal-bars span:nth-child(2) { height: 65%; animation-delay: 0.2s; }
    .signal-bars span:nth-child(3) { height: 100%; animation-delay: 0.4s; }
    .signal-bars span:nth-child(4) { height: 75%; animation-delay: 0.6s; }
    @keyframes signal-flicker { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    .input-field {
      width: 100%; padding: 14px 16px; border-radius: 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); font-size: 0.95rem; transition: border-color .15s, box-shadow .15s;
    }
    .input-field::placeholder { color: var(--text-mute); }
    .input-field:focus { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(70,215,208,0.12); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: #1A0E04; font-weight: 700;
      border-radius: 10px; padding: 14px; transition: filter .15s, transform .15s, box-shadow .15s;
      box-shadow: 0 8px 24px -8px rgba(255,145,66,0.35);
    }
    .btn-primary:hover { filter: brightness(1.06); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; transform: none; }
    .btn-primary:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; }

    .btn-ghost {
      background: transparent; border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 10px; transition: border-color .15s, color .15s, background .15s;
    }
    .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); background: rgba(255,255,255,0.02); }
    .btn-ghost:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; }

    .card-sistema {
      background: linear-gradient(180deg, var(--surface), var(--surface) 60%, var(--surface-2));
      border: 1px solid var(--border-soft);
      border-radius: 16px; transition: border-color .2s, transform .2s, box-shadow .2s;
      position: relative; overflow: hidden;
    }
    .card-sistema::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(70,215,208,0.5), transparent);
      opacity: 0; transition: opacity .2s;
    }
    .card-sistema:hover { border-color: var(--accent-2-dim); transform: translateY(-3px); box-shadow: 0 16px 32px -16px rgba(0,0,0,0.5); }
    .card-sistema:hover::before { opacity: 1; }
    .card-sistema .admin-actions { opacity: 0; transition: opacity .15s; }
    .card-sistema:hover .admin-actions,
    .card-sistema:focus-within .admin-actions { opacity: 1; }

    .btn-acessar {
      border: 1px solid var(--accent-2-dim); color: var(--accent-2);
      border-radius: 10px; font-weight: 600; transition: background .15s, color .15s;
    }
    .btn-acessar:hover { background: var(--accent-2); color: #06201E; }
    .btn-acessar:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; }

    .spinner {
      width: 16px; height: 16px; border: 2.5px solid rgba(26,14,4,0.35);
      border-top-color: #1A0E04; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badge-role {
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.04em;
      padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .badge-role.admin { color: var(--accent); border-color: var(--accent-dim); background: rgba(255,145,66,0.08); }

    .emblema {
      width: 56px; height: 56px; border-radius: 16px; position: relative;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-2); border: 1px solid var(--border);
    }
    .emblema::before {
      content: ''; position: absolute; inset: 8px; border-radius: 10px;
      border: 1px solid rgba(255,145,66,0.25);
    }

    ::selection { background: rgba(255,145,66,0.28); }

    @media (prefers-reduced-motion: reduce) {
      .radar::before, .pulse-dot::after, .signal-bars span, .hud-scroll { animation: none !important; }
    }

    @media (max-width: 640px) {
      .hud-segment.mid { display: none; }
    }
  </style>
</head>
<body>
  <!-- HUD / Ticker de telemetria (elemento assinatura, decorativo) -->
  <div class="hud-bar" role="status" aria-label="Status do portal">
    <div class="hud-segment status">
      <span class="pulse-dot" style="width:6px;height:6px;"></span> PORTAL ONLINE
    </div>
    <div class="hud-track">
      <div class="hud-scroll" id="hud-scroll">
        <span>CANAL <span class="hl">SEGURO</span> ESTABELECIDO</span>
        <span>LAT 22.9068° S · LON 43.1729° W</span>
        <span>SINAL <span class="hl">98%</span></span>
        <span>LATÊNCIA <span class="hl">12ms</span></span>
        <span>NÓS MONITORADOS: <span id="hud-count" class="hl">--</span></span>
        <span>CRIPTOGRAFIA TLS 1.3 ATIVA</span>
      </div>
    </div>
    <div class="hud-segment mid">SESSÃO CIFRADA</div>
    <div class="hud-clock" id="hud-clock">--:--:--</div>
  </div>

  <div class="grid-backdrop"></div>
  <div class="scanline-overlay"></div>

  <div class="max-w-5xl mx-auto p-6 md:p-10 relative z-10">

    <!-- Tela de Login -->
    <div id="login-screen">
      <div class="relative max-w-md mx-auto mt-16 md:mt-24">
        <div class="radar"></div>
        <div class="border rounded-3xl p-10 text-center" style="background: var(--surface); border-color: var(--border-soft);">
          <div class="flex justify-center mb-5">
            <div class="emblema">
              <div class="pulse-dot"></div>
            </div>
          </div>
          <p class="font-mono text-xs tracking-widest mb-2" style="color: var(--text-mute);">ACESSO INTERNO · REDE DE RASTREADORES</p>
          <h1 class="font-display text-3xl font-bold mb-8">Portal de Sistemas</h1>

          <div class="space-y-3 text-left">
            <input id="email" type="email" placeholder="E-mail corporativo" class="input-field">
            <input id="password" type="password" placeholder="Senha" class="input-field">
          </div>
          <p id="login-erro" class="text-sm mt-3 mb-1 min-h-[1.25rem] text-left" style="color: var(--danger);"></p>

          <button id="btn-login" onclick="fazerLogin()" class="btn-primary w-full flex items-center justify-center gap-2 mt-4">
            <span id="btn-login-texto">Entrar</span>
          </button>

          <div class="mt-6 text-sm">
            <button onclick="fazerCadastro()" class="hover:underline" style="color: var(--text-dim);">
              Criar nova conta
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Portal -->
    <div id="portal-screen" class="hidden">
      <div class="flex flex-wrap justify-between items-center gap-4 mb-10 pb-6" style="border-bottom: 1px solid var(--border-soft);">
        <div class="flex items-center gap-4">
          <div class="emblema" style="width:48px;height:48px;border-radius:14px;">
            <div class="pulse-dot"></div>
          </div>
          <div>
            <h1 class="font-display text-2xl font-bold leading-tight">Portal de Sistemas</h1>
            <div class="flex items-center gap-2 mt-1">
              <span id="usuario-logado" class="text-sm font-mono" style="color: var(--text-dim);"></span>
              <span id="badge-role" class="badge-role"></span>
            </div>
          </div>
        </div>
        <button onclick="fazerLogout()" class="btn-ghost px-5 py-2.5 text-sm font-medium">
          Sair
        </button>
      </div>

      <div class="flex justify-between items-center mb-6">
        <h2 class="font-display text-lg font-semibold" style="color: var(--text-dim);">
          Sistemas <span id="contador-sistemas" class="font-mono text-xs align-middle" style="color: var(--text-mute);"></span>
        </h2>
        <button id="btn-novo-sistema" onclick="abrirModal()" class="hidden btn-primary px-5 py-2.5 text-sm">
          + Adicionar sistema
        </button>
      </div>

      <div id="sistemas-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="rounded-3xl p-8 w-full max-w-md" style="background: var(--surface); border: 1px solid var(--border-soft);">
      <h3 id="modal-title" class="font-display text-xl font-bold mb-6">Adicionar sistema</h3>
      <div class="space-y-3">
        <input id="nome" placeholder="Nome do sistema" class="input-field">
        <input id="url" placeholder="https://..." class="input-field">
      </div>
      <p id="modal-erro" class="text-sm mt-2 mb-2 min-h-[1.25rem]" style="color: var(--danger);"></p>
      <div class="flex gap-3 mt-4">
        <button onclick="fecharModal()" class="btn-ghost flex-1 py-3">Cancelar</button>
        <button onclick="salvarSistema()" class="btn-primary flex-1 py-3">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ COLE AQUI OS DADOS DO SEU PROJETO SUPABASE
    // (Configurações do projeto -> API -> Project URL / anon public key)
    const SUPABASE_URL = 'https://unkpcytummovyzfrjatz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_F7wm6c8OvWpYp-HG15uJXg_xf2XWx8Q';

    // OBS: a lib do Supabase se registra em window.supabase.
    // Usamos "sb" como nome do cliente pra não sobrescrever/conflitar com isso.
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let editandoId = null;
    let papelUsuario = 'colaborador'; // 'admin' ou 'colaborador'

    // ==================== HUD decorativo (relógio) ====================
    function atualizarRelogioHud() {
      const el = document.getElementById('hud-clock');
      if (!el) return;
      const agora = new Date();
      el.textContent = agora.toLocaleTimeString('pt-BR', { hour12: false });
    }
    atualizarRelogioHud();
    setInterval(atualizarRelogioHud, 1000);

    // ==================== LOGIN ====================
    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const erroEl = document.getElementById('login-erro');
      erroEl.textContent = '';
      erroEl.style.color = 'var(--danger)';

      if (!email || !password) {
        erroEl.textContent = 'Preencha e-mail e senha.';
        return;
      }

      setBotaoLoginCarregando(true);
      const { error } = await sb.auth.signInWithPassword({ email, password });
      setBotaoLoginCarregando(false);

      if (error) {
        erroEl.textContent = error.message === 'Invalid login credentials'
          ? 'E-mail ou senha inválidos.'
          : error.message;
        return;
      }
      mostrarPortal();
    }

    async function fazerCadastro() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const erroEl = document.getElementById('login-erro');
      erroEl.textContent = '';

      if (!email || password.length < 6) {
        erroEl.style.color = 'var(--danger)';
        erroEl.textContent = 'E-mail válido e senha com no mínimo 6 caracteres.';
        return;
      }

      const { error } = await sb.auth.signUp({ email, password });
      if (error) {
        erroEl.style.color = 'var(--danger)';
        erroEl.textContent = error.message;
      } else {
        erroEl.style.color = 'var(--accent-2)';
        erroEl.textContent = 'Conta criada! Verifique seu e-mail (se a confirmação estiver ativa) e faça login.';
      }
    }

    async function fazerLogout() {
      await sb.auth.signOut();
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('portal-screen').classList.add('hidden');
    }

    function setBotaoLoginCarregando(carregando) {
      const btn = document.getElementById('btn-login');
      const texto = document.getElementById('btn-login-texto');
      btn.disabled = carregando;
      texto.innerHTML = carregando ? '<span class="spinner"></span>' : 'Entrar';
    }

    async function mostrarPortal() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('portal-screen').classList.remove('hidden');

      const { data: { user } } = await sb.auth.getUser();

      // Busca o papel (role) do usuário na tabela profiles
      papelUsuario = 'colaborador';
      if (user) {
        const { data: perfil } = await sb.from('profiles').select('role').eq('id', user.id).single();
        if (perfil) papelUsuario = perfil.role;
      }

      const ehAdmin = papelUsuario === 'admin';
      document.getElementById('usuario-logado').textContent = user ? user.email : '';

      const badge = document.getElementById('badge-role');
      badge.textContent = ehAdmin ? 'ADMIN' : 'COLABORADOR';
      badge.classList.toggle('admin', ehAdmin);

      // Só admin vê o botão de adicionar sistema
      document.getElementById('btn-novo-sistema').classList.toggle('hidden', !ehAdmin);

      carregarSistemas();
    }

    // ==================== SISTEMAS ====================
    async function carregarSistemas() {
      const container = document.getElementById('sistemas-container');
      container.innerHTML = '<p class="col-span-full text-center py-16 font-mono text-sm" style="color: var(--text-mute);">Carregando sistemas...</p>';

      const { data, error } = await sb.from('sistemas').select('*').order('created_at', { ascending: false });

      const contador = document.getElementById('contador-sistemas');
      const hudCount = document.getElementById('hud-count');

      if (error) {
        contador.textContent = '';
        container.innerHTML = `<p class="col-span-full text-center py-16" style="color: var(--danger);">Erro ao carregar sistemas: ${error.message}</p>`;
        return;
      }

      contador.textContent = data.length > 0 ? `· ${String(data.length).padStart(2, '0')} ATIVOS` : '';
      if (hudCount) hudCount.textContent = String(data.length).padStart(2, '0');

      const ehAdmin = papelUsuario === 'admin';

      if (data.length === 0) {
        container.innerHTML = `
          <div class="col-span-full text-center py-16 rounded-3xl" style="border: 1px dashed var(--border); color: var(--text-dim);">
            <p class="font-display text-lg mb-1">Nenhum sistema por aqui ainda</p>
            <p class="text-sm" style="color: var(--text-mute);">${ehAdmin ? 'Clique em "Adicionar sistema" para cadastrar o primeiro.' : 'Peça a um administrador para cadastrar os sistemas da equipe.'}</p>
          </div>`;
        return;
      }

      container.innerHTML = '';

      data.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'card-sistema p-7';
        div.innerHTML = `
          <div class="flex items-center justify-between mb-5">
            <span class="font-mono text-xs" style="color: var(--text-mute);">NÓ-${String(i + 1).padStart(2, '0')}</span>
            <div class="signal-bars"><span></span><span></span><span></span><span></span></div>
          </div>
          <h3 class="font-display text-xl font-bold mb-6 leading-snug">${escapeHtml(s.nome)}</h3>
          <a href="${escapeHtml(s.url)}" target="_blank" rel="noopener" class="btn-acessar block w-full py-3 text-center text-sm">
            Abrir sistema →
          </a>
          ${ehAdmin ? `
          <div class="admin-actions flex gap-2 mt-4 pt-4" style="border-top: 1px solid var(--border-soft);">
            <button onclick="editarSistema(${s.id})" class="flex-1 py-2 rounded-lg text-xs font-medium btn-ghost">Editar</button>
            <button onclick="removerSistema(${s.id})" class="flex-1 py-2 rounded-lg text-xs font-medium btn-ghost" style="color: var(--danger);">Remover</button>
          </div>` : ''}
        `;
        container.appendChild(div);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    function normalizarUrl(url) {
      if (!/^https?:\/\//i.test(url)) return 'https://' + url;
      return url;
    }

    async function salvarSistema() {
      const nome = document.getElementById('nome').value.trim();
      let url = document.getElementById('url').value.trim();
      const erroEl = document.getElementById('modal-erro');
      erroEl.textContent = '';

      if (!nome || !url) {
        erroEl.textContent = 'Preencha nome e URL.';
        return;
      }
      url = normalizarUrl(url);

      const { error } = editandoId
        ? await sb.from('sistemas').update({ nome, url }).eq('id', editandoId)
        : await sb.from('sistemas').insert([{ nome, url }]);

      if (error) {
        erroEl.textContent = 'Erro ao salvar: ' + error.message;
        return;
      }

      fecharModal();
      carregarSistemas();
    }

    async function removerSistema(id) {
      if (confirm("Deseja realmente remover este sistema?")) {
        const { error } = await sb.from('sistemas').delete().eq('id', id);
        if (error) return alert("Erro ao remover: " + error.message);
        carregarSistemas();
      }
    }

    function editarSistema(id) {
      sb.from('sistemas').select('*').eq('id', id).single().then(({ data, error }) => {
        if (error) return alert("Erro ao carregar sistema: " + error.message);
        if (data) {
          editandoId = data.id;
          document.getElementById('modal-title').textContent = 'Editar sistema';
          document.getElementById('nome').value = data.nome;
          document.getElementById('url').value = data.url;
          document.getElementById('modal-erro').textContent = '';
          document.getElementById('modal').classList.remove('hidden');
        }
      });
    }

    function abrirModal() {
      editandoId = null;
      document.getElementById('modal-title').textContent = 'Adicionar sistema';
      document.getElementById('nome').value = '';
      document.getElementById('url').value = '';
      document.getElementById('modal-erro').textContent = '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function fecharModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    // Verificar se já está logado (ex: ao recarregar a página)
    sb.auth.onAuthStateChange((event, session) => {
      if (session) mostrarPortal();
    });
  </script>
</body>
</html>
